name: Scraper - Obesity
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *' # Runs at 5:00 AM PST

jobs:
  run-obesity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - run: pip install aiohttp beautifulsoup4

      - name: Run Obesity Scraper
        working-directory: .
        env:
          PYTHONUNBUFFERED: "1"
          WATCHLIST_URL: "https://docs.google.com/spreadsheets/d/16agKGoulUiLR0_wzgrjr_sd3Zj6PWLDI/export?format=csv"
          OUTPUT_PREFIX: "obesity"
        run: python nct_scraper.py

      - name: Send Email Alerts
        working-directory: .
        env:
          OUTPUT_PREFIX: "obesity"
          BOT_EMAIL: ${{ secrets.BOT_EMAIL }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          MAILING_LIST: ${{ secrets.MAILING_LIST }}
        run: python send_alerts.py

      - name: Commit and Push
        working-directory: .
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add obesity_results.json obesity_urls.json obesity_metadata.json
          
          # Check if there are actually any changes to save
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "🤖 Auto-update: Obesity data sync"
            # Pull any changes the other robot might have made while this one was running!
            git pull --rebase origin main
            git push
          else
            echo "✅ No new changes to save today!"
          fi

name: Scraper - Obesity
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *' # Runs at 5:00 AM PST

jobs:
  run-obesity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - run: pip install aiohttp beautifulsoup4

      - name: Run Obesity Scraper
        working-directory: .
        env:
          WATCHLIST_URL: "https://docs.google.com/spreadsheets/d/1oFAoK3McsI0KPh6SulwbxNTxYWubsHul//export?format=csv"
          OUTPUT_PREFIX: "obesity"
        run: python nct_scraper.py

      - name: Send Email Alerts
        working-directory: .
        env:
          OUTPUT_PREFIX: "obesity"
          BOT_EMAIL: ${{ secrets.BOT_EMAIL }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          MAILING_LIST: ${{ secrets.MAILING_LIST }}
        run: python send_alerts.py

      - name: Commit and Push
        working-directory: .
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add obesity_results.json obesity_urls.json obesity_metadata.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update: Obesity data sync"
          git push

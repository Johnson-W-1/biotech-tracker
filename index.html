<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biotech Clinical Trial Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h1 {
            margin: 0;
            color: #005f73;
            font-size: 24px;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        select {
            padding: 10px 15px;
            font-size: 16px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            background: #fff;
            color: #333;
            cursor: pointer;
            font-weight: bold;
        }
        select:focus {
            outline: none;
            border-color: #0a9396;
        }
        #last-updated {
            font-size: 14px;
            color: #6c757d;
            margin: 0;
        }
        .card {
            background: #ffffff;
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 6px solid #ccc;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateX(5px);
        }
        /* Sentiment Colors */
        .card.Positive { border-left-color: #2b9348; } /* Green */
        .card.Negative { border-left-color: #d90429; } /* Red */
        .card.Neutral { border-left-color: #005f73; }  /* Blue */

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #f1f1f1;
            padding-bottom: 10px;
        }
        .card-header h3 {
            margin: 0;
            font-size: 18px;
            color: #222;
        }
        .badge-new {
            background-color: #e63946;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .meta-text {
            font-size: 14px;
            color: #555;
            margin: 5px 0;
        }
        .notes {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            font-style: italic;
            font-size: 15px;
            color: #444;
            margin-top: 15px;
        }
        a.source-link {
            display: inline-block;
            margin-top: 15px;
            color: #0a9396;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        a.source-link:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            font-size: 18px;
            color: #666;
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div>
            <h1>🧬 Biotech Trial Tracker</h1>
            <p id="last-updated">Last Updated: Loading...</p>
        </div>
        <div class="controls">
            <label for="dataset-select" style="font-weight: bold; color: #555;">Watchlist:</label>
            <select id="dataset-select" onchange="loadDashboard()">
                <option value="obesity">Obesity</option>
                <option value="nsclc">Non-Small Cell Lung Cancer (NSCLC)</option>
            </select>
        </div>
    </div>

    <div id="dashboard-content">
        </div>

    <script>
        async function loadDashboard() {
            const prefix = document.getElementById('dataset-select').value;
            const contentDiv = document.getElementById('dashboard-content');
            const updatedText = document.getElementById('last-updated');
            
            contentDiv.innerHTML = '<div class="loading">Fetching latest data...</div>';
            
            try {
                // 1. Fetch the Timestamp
                const metaResponse = await fetch(`${prefix}_metadata.json`);
                if (metaResponse.ok) {
                    const metaData = await metaResponse.json();
                    updatedText.innerText = "Last Updated: " + metaData.last_updated;
                } else {
                    updatedText.innerText = "Last Updated: Unknown";
                }

                // 2. Fetch the Actual Trial Data
                const dataResponse = await fetch(`${prefix}_results.json`);
                if (!dataResponse.ok) {
                    throw new Error("No data file found.");
                }
                const data = await dataResponse.json();

                if (data.length === 0) {
                    contentDiv.innerHTML = `<div class="loading">No trial updates found for ${prefix.toUpperCase()} yet.</div>`;
                    return;
                }

                // 3. Generate the Cards
                let html = '';
                data.forEach(item => {
                    const isNewBadge = item.is_new ? '<span class="badge-new">New Today</span>' : '';
                    
                    html += `
                    <div class="card ${item.sentiment}">
                        <div class="card-header">
                            <h3>${item.ticker} | ${item.drug_name}</h3>
                            ${isNewBadge}
                        </div>
                        <p class="meta-text"><strong>Date:</strong> ${item.date}</p>
                        <p class="meta-text"><strong>Trial ID:</strong> ${item.nct_id}</p>
                        <p class="meta-text"><strong>Status:</strong> ${item.status}</p>
                        <div class="notes">"${item.notes}"</div>
                        <a href="${item.source}" target="_blank" class="source-link">Read Full Source &rarr;</a>
                    </div>
                    `;
                });

                contentDiv.innerHTML = html;

            } catch (error) {
                console.error(error);
                contentDiv.innerHTML = `
                    <div class="loading" style="color: #d90429;">
                        <strong>Could not load data for ${prefix.toUpperCase()}.</strong><br>
                        Make sure the GitHub scraper has successfully run and saved the JSON files!
                    </div>
                `;
            }
        }

        // Auto-load the dashboard the second the page opens
        window.onload = loadDashboard;
    </script>

</body>
</html>

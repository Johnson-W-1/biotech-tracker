<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Trial Outcomes Tracker</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;}
  h2 { color: #005f73; margin-bottom: 5px; text-align: center; }
  .last-updated-banner { font-size: 0.85rem; color: #6c757d; margin-bottom: 20px; font-style: italic; }

  .controls-wrapper { width: 100%; max-width: 1550px; background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
  .filters { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #e9ecef; }
  .filter-group { display: flex; align-items: center; gap: 8px; position: relative;}
  .filter-group label { font-size: 0.9rem; font-weight: 600; color: #005f73; }
  .filter-group input[type="text"] { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; outline: none; width: 140px; }
  .filter-group input[type="text"]:focus { border-color: #0a9396; }
  
  .filter-group select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; outline: none; background: white; cursor: pointer; color: #005f73; font-weight: bold; }
  .filter-group select:focus { border-color: #0a9396; }

  .toggles-container { margin-left: auto; display: flex; gap: 10px; flex-wrap: wrap;}
  .toggle-btn { display: flex; align-items: center; gap: 6px; font-weight: bold; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: background 0.2s; border: 1px solid transparent; user-select: none;}
  .toggle-btn input { cursor: pointer; margin: 0; }
  
  .toggle-new { color: #d90429; background: #fff0f3; border-color: #ffccd5; }
  .toggle-new:hover { background: #ffe3e8; }
  .toggle-unreviewed { color: #005f73; background: #e0fbfc; border-color: #90e0ef; }
  .toggle-unreviewed:hover { background: #caf0f8; }
  .toggle-trash { color: #5c677d; background: #e2eafc; border-color: #abc4ff; }
  .toggle-trash:hover { background: #d7e3fc; }
  
  .btn-export { color: white; background: #2b9348; border-color: #1b4332; }
  .btn-export:hover { background: #1b4332; }

  .badge-new { background: #d90429; color: white; padding: 2px 5px; border-radius: 3px; font-size: 0.65rem; font-weight: bold; margin-left: 6px; vertical-align: top; animation: pulse 2s infinite;}
  .ind-badge { background: #e2eafc; color: #002855; border: 1px solid #adc178; padding: 3px 6px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; display: inline-block; margin-top: 2px;}
  .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; color: white; display: inline-block; white-space: nowrap;}
  .status-actual { background: #2a9d8f; } 
  .status-future { background: #ee9b00; } 
  .status-unspec { background: #adb5bd; } 

  .sent-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; color: white; white-space: nowrap; display: inline-block;}
  .sent-positive { background: #2b9348; } 
  .sent-negative { background: #d90429; } 
  .sent-neutral { background: #6c757d; } 

  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

  .custom-select { position: relative; display: inline-block; width: 140px; }
  .select-box { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; background: white; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none;}
  .select-box::after { content: '▼'; float: right; font-size: 0.7rem; margin-top: 3px; color: #666; }
  .dropdown-list { display: none; position: absolute; background: white; border: 1px solid #ccc; max-height: 250px; overflow-y: auto; z-index: 1000; width: 100%; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 4px; left: 0;}
  .dropdown-list label { display: block; padding: 6px 10px; font-size: 0.9rem; cursor: pointer; color: #333; font-weight: normal; transition: background 0.1s;}
  .dropdown-list label:hover { background: #f0fdfa; color: #0a9396; }
  .dropdown-list input[type="checkbox"] { margin-right: 8px; cursor: pointer; }
  .dropdown-list.show { display: block; }
  .dropdown-list .select-all-row { font-weight: bold; border-bottom: 1px solid #e9ecef; padding-bottom: 8px; margin-bottom: 4px; }

  #table-view { width: 100%; max-width: 1550px; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e9ecef; }
  th { background: #005f73; color: white; cursor: pointer; position: relative; user-select: none; transition: background 0.2s; font-size: 0.9rem;}
  th:hover { background: #0a9396; }
  .sort-icon { font-size: 0.75rem; margin-left: 5px; opacity: 0.5; }
  th.active-sort .sort-icon { opacity: 1; color: #ffca3a; }
  th.unsortable { cursor: default; }
  th.unsortable:hover { background: #005f73; }
  tr:hover { background: #f8f9fa; }
  
  tr.row-new { background-color: #fff0f3; }
  tr.row-reviewed { opacity: 0.55; background-color: #f8f9fa; transition: opacity 0.3s;}
  tr.row-reviewed:hover { opacity: 1; }
  tr.row-trash { background-color: #ffe6e6; opacity: 0.8;}

  .td-date { font-weight: bold; color: #0a9396; white-space: nowrap; font-size: 0.9rem;}
  .td-date-added { font-weight: normal; color: #6c757d; font-size: 0.8rem; white-space: nowrap;}
  .td-ticker { font-weight: bold; }
  
  .nct-container { display: flex; flex-wrap: wrap; gap: 4px; max-width: 150px; }
  .td-nct { font-family: monospace; font-size: 0.85rem; color: #005f73; background: #e9ecef; padding: 2px 6px; border-radius: 4px; text-decoration: none;}
  .td-nct:hover { background: #0a9396; color: white;}
  .td-notes { font-size: 0.85rem; color: #555; max-width: 320px; line-height: 1.4; }
  
  .checkbox-wrapper { display: flex; justify-content: center; align-items: center; }
  .checkbox-wrapper input { width: 18px; height: 18px; cursor: pointer; accent-color: #0a9396;}
  .action-btn { cursor: pointer; padding: 4px 8px; border: none; border-radius: 4px; font-size: 0.75rem; font-weight: bold; transition: 0.2s;}
  .btn-trash { color: #d90429; background: #ffccd5; }
  .btn-trash:hover { background: #ffb3c1; }
  .btn-restore { color: #2b9348; background: #b7e4c7; }
  .btn-restore:hover { background: #95d5b2; }

</style>
</head>
<body>

<h2>Clinical Trial Outcomes Tracker</h2>
<div class="last-updated-banner" id="last-updated-text">Data Last Synced: Fetching...</div>

<div class="controls-wrapper">
  <div class="filters">
    
    <div class="filter-group">
      <label for="dataset-select">Watchlist:</label>
      <select id="dataset-select" onchange="switchDataset()">
        <option value="obesity">Obesity</option>
        <option value="nsclc">NSCLC</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="global-search">Search:</label>
      <input type="text" id="global-search" placeholder="Text or NCT ID...">
    </div>

    <div class="filter-group">
      <label>Date Added:</label>
      <div class="custom-select">
        <div class="select-box" id="da-box" onclick="toggleDropdown('da-dropdown')">All Selected</div>
        <div class="dropdown-list" id="da-dropdown"></div>
      </div>
    </div>
    
    <div class="filter-group">
      <label>Sentiment:</label>
      <div class="custom-select">
        <div class="select-box" id="sent-box" onclick="toggleDropdown('sent-dropdown')">All Selected</div>
        <div class="dropdown-list" id="sent-dropdown">
          <label class="select-all-row"><input type="checkbox" value="ALL" checked class="sent-chk"> (Select All)</label>
          <label><input type="checkbox" value="Positive" checked class="sent-chk"> Positive</label>
          <label><input type="checkbox" value="Negative" checked class="sent-chk"> Negative</label>
          <label><input type="checkbox" value="Neutral" checked class="sent-chk"> Neutral</label>
        </div>
      </div>
    </div>

    <div class="filter-group">
      <label>Ticker:</label>
      <div class="custom-select">
        <div class="select-box" id="company-box" onclick="toggleDropdown('company-dropdown')">All Selected</div>
        <div class="dropdown-list" id="company-dropdown"></div>
      </div>
    </div>

    <div class="filter-group">
      <label>Status:</label>
      <div class="custom-select">
        <div class="select-box" id="status-box" onclick="toggleDropdown('status-dropdown')">All Selected</div>
        <div class="dropdown-list" id="status-dropdown"></div>
      </div>
    </div>

    <div class="toggles-container">
      <label class="toggle-btn toggle-unreviewed">
        <input type="checkbox" id="filter-unreviewed"> 👁️ Hide Reviewed
      </label>
      <label class="toggle-btn toggle-new">
        <input type="checkbox" id="filter-new-only"> 🔥 Show Only New
      </label>
      <label class="toggle-btn toggle-trash">
        <input type="checkbox" id="view-trash-only"> 🗑️ View Trash
      </label>
      <button class="toggle-btn btn-export" onclick="exportToCSV()">📥 Export to CSV</button>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSddWu0oXHsH6aCU0cOOpEpIva0YyMIlGq9aj9G3K2t_QLRfNQ/viewform?usp=publish-editor" target="_blank" class="toggle-btn" style="background:#e0fbfc; color:#005f73; text-decoration:none;">📬 Subscribe to Alerts</a>
    </div>
  </div>
</div>

<div id="table-view">
  <table id="catalyst-table">
    <thead>
      <tr>
        <th class="unsortable" style="text-align: center;" title="Mark as Reviewed">✔</th>
        <th data-sort="date" class="active-sort">Event Date <span class="sort-icon">▼</span></th>
        <th data-sort="date_added">Date Added <span class="sort-icon"></span></th>
        <th data-sort="ticker">Ticker <span class="sort-icon"></span></th>
        <th class="unsortable">NCT ID(s)</th> 
        <th data-sort="drug_name">Drug & Indication <span class="sort-icon"></span></th>
        <th data-sort="status">Report Status <span class="sort-icon"></span></th>
        <th data-sort="sentiment">Sentiment <span class="sort-icon"></span></th> 
        <th class="unsortable">Extracted Context</th>
        <th class="unsortable">Source</th>
        <th class="unsortable">Action</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script>
  let rawEvents = [];
  let currentFilteredData = [];
  let currentSortColumn = 'date';
  let sortAscending = false; 

  let currentPrefix = 'obesity';
  let reviewedKeys = [];
  let trashKeys = [];

  function getEventKey(evt) {
    return `${evt.date}_${evt.ticker}_${evt.nct_id.replace(/\s+/g, '')}_${evt.status.replace(/\s+/g, '')}`;
  }

  function toggleReview(key) {
    if (reviewedKeys.includes(key)) {
      reviewedKeys = reviewedKeys.filter(k => k !== key);
    } else {
      reviewedKeys.push(key);
    }
    localStorage.setItem(`${currentPrefix}_reviewed_v1`, JSON.stringify(reviewedKeys));
    applyFilters(); 
  }

  function toggleTrash(key) {
    if (trashKeys.includes(key)) {
      trashKeys = trashKeys.filter(k => k !== key);
    } else {
      trashKeys.push(key);
      if(!reviewedKeys.includes(key)) toggleReview(key); 
    }
    localStorage.setItem(`${currentPrefix}_trash_v1`, JSON.stringify(trashKeys));
    applyFilters();
  }

  function switchDataset() {
    currentPrefix = document.getElementById('dataset-select').value;
    
    document.getElementById('global-search').value = "";
    document.getElementById('filter-unreviewed').checked = false;
    document.getElementById('filter-new-only').checked = false;
    document.getElementById('view-trash-only').checked = false;

    loadData();
  }

  function loadData() {
    reviewedKeys = JSON.parse(localStorage.getItem(`${currentPrefix}_reviewed_v1`)) || [];
    trashKeys = JSON.parse(localStorage.getItem(`${currentPrefix}_trash_v1`)) || [];

    document.getElementById("last-updated-text").innerText = `Data Last Synced: Fetching...`;
    
    fetch(`${currentPrefix}_metadata.json`)
      .then(r => r.json())
      .then(data => { document.getElementById("last-updated-text").innerText = `Data Last Synced: ${data.last_updated}`; })
      .catch(err => { document.getElementById("last-updated-text").innerText = "Data Last Synced: Awaiting First Run"; });

    fetch(`${currentPrefix}_results.json`)
      .then(r => {
        if (!r.ok) throw new Error("JSON file not found");
        return r.json();
      })
      .then(data => {
        rawEvents = data;
        populateFilters(rawEvents);
        applyFilters(); 
      })
      .catch(err => {
        console.error(`Error loading ${currentPrefix}_results.json`, err);
        rawEvents = [];
        document.getElementById('table-body').innerHTML = `<tr><td colspan="11" style="text-align:center; padding:30px; color:#d90429;"><strong>Data not found.</strong> Make sure the ${currentPrefix.toUpperCase()} GitHub Action has finished running.</td></tr>`;
      });
  }

  loadData();

  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const column = th.getAttribute('data-sort');
      if (currentSortColumn === column) { sortAscending = !sortAscending; } 
      else { currentSortColumn = column; sortAscending = true; }
      
      document.querySelectorAll('th').forEach(h => {
        h.classList.remove('active-sort');
        const icon = h.querySelector('.sort-icon');
        if (icon) icon.innerText = '';
      });
      
      th.classList.add('active-sort');
      th.querySelector('.sort-icon').innerText = sortAscending ? '▲' : '▼';
      applyFilters(); 
    });
  });

  function sortData(data) {
    return data.sort((a, b) => {
      let valA = a[currentSortColumn] || "Legacy Data";
      let valB = b[currentSortColumn] || "Legacy Data";
      if (valA < valB) return sortAscending ? -1 : 1;
      if (valA > valB) return sortAscending ? 1 : -1;
      return 0;
    });
  }

  function toggleDropdown(id) { document.getElementById(id).classList.toggle('show'); }
  window.addEventListener('click', function(e) {
    if (!e.target.closest('.custom-select')) { document.querySelectorAll('.dropdown-list').forEach(d => d.classList.remove('show')); }
  });

  function populateFilters(data) {
    const compDropdown = document.getElementById("company-dropdown");
    const companiesRaw = data.flatMap(e => e.ticker.split(/[,/]/).map(t => t.trim()));
    const companies = [...new Set(companiesRaw)].sort();
    let compHTML = `<label class="select-all-row"><input type="checkbox" value="ALL" checked class="comp-chk"> (Select All)</label>`;
    companies.forEach(c => { compHTML += `<label><input type="checkbox" value="${c}" checked class="comp-chk"> ${c}</label>`; });
    compDropdown.innerHTML = compHTML;

    const statusDropdown = document.getElementById("status-dropdown");
    const statuses = [...new Set(data.map(e => e.status))].sort();
    let statHTML = `<label class="select-all-row"><input type="checkbox" value="ALL" checked class="stat-chk"> (Select All)</label>`;
    statuses.forEach(stat => { statHTML += `<label><input type="checkbox" value="${stat}" checked class="stat-chk"> ${stat}</label>`; });
    statusDropdown.innerHTML = statHTML;

    const daDropdown = document.getElementById("da-dropdown");
    const datesAdded = [...new Set(data.map(e => e.date_added || "Legacy Data"))].sort().reverse();
    let daHTML = `<label class="select-all-row"><input type="checkbox" value="ALL" checked class="da-chk"> (Select All)</label>`;
    datesAdded.forEach(da => { daHTML += `<label><input type="checkbox" value="${da}" checked class="da-chk"> ${da}</label>`; });
    daDropdown.innerHTML = daHTML;

    const sentDropdown = document.getElementById("sent-dropdown");
    const sentCheckboxes = sentDropdown.querySelectorAll('input[type="checkbox"]');
    sentCheckboxes.forEach(chk => chk.checked = true);

    setupCheckboxLogic('comp-chk', 'company-box');
    setupCheckboxLogic('stat-chk', 'status-box');
    setupCheckboxLogic('da-chk', 'da-box');
    setupCheckboxLogic('sent-chk', 'sent-box');
  }

  function setupCheckboxLogic(className, boxId) {
    const checkboxes = document.querySelectorAll(`.${className}`);
    if(checkboxes.length === 0) return;
    const allCheckbox = checkboxes[0];
    checkboxes.forEach(chk => {
      const newChk = chk.cloneNode(true);
      chk.parentNode.replaceChild(newChk, chk);
      
      newChk.addEventListener('change', function() {
        const currentCheckboxes = document.querySelectorAll(`.${className}`);
        const currentAllBox = currentCheckboxes[0];
        
        if (this.value === "ALL") { currentCheckboxes.forEach(c => c.checked = this.checked); } 
        else {
          if (!this.checked) currentAllBox.checked = false;
          const allSpecificChecked = Array.from(currentCheckboxes).slice(1).every(c => c.checked);
          if (allSpecificChecked) currentAllBox.checked = true;
        }
        updateSelectBoxLabel(className, boxId);
        applyFilters(); 
      });
    });
    updateSelectBoxLabel(className, boxId);
  }

  function updateSelectBoxLabel(className, boxId) {
    const checkboxes = document.querySelectorAll(`.${className}`);
    if(checkboxes.length === 0) return;
    const allCheckbox = checkboxes[0];
    const checkedSpecific = Array.from(checkboxes).slice(1).filter(c => c.checked);
    const box = document.getElementById(boxId);

    if (allCheckbox.checked || checkedSpecific.length === checkboxes.length - 1) { box.innerText = "All Selected"; } 
    else if (checkedSpecific.length === 0) { box.innerText = "None Selected"; } 
    else if (checkedSpecific.length === 1) { box.innerText = checkedSpecific[0].value; } 
    else { box.innerText = `${checkedSpecific.length} Selected`; }
  }

  function applyFilters() {
    const term = document.getElementById('global-search').value.toLowerCase();
    const selCompanies = Array.from(document.querySelectorAll('.comp-chk:checked')).map(c => c.value);
    const selStatuses = Array.from(document.querySelectorAll('.stat-chk:checked')).map(c => c.value);
    const selDateAddeds = Array.from(document.querySelectorAll('.da-chk:checked')).map(c => c.value);
    const selSentiments = Array.from(document.querySelectorAll('.sent-chk:checked')).map(c => c.value);
    
    const showOnlyNew = document.getElementById('filter-new-only').checked;
    const hideReviewed = document.getElementById('filter-unreviewed').checked;
    const viewTrash = document.getElementById('view-trash-only').checked;

    let filteredData = rawEvents.filter(evt => {
      const evtKey = getEventKey(evt);
      const isDeleted = trashKeys.includes(evtKey);
      const isReviewed = reviewedKeys.includes(evtKey);

      if (viewTrash && !isDeleted) return false;
      if (!viewTrash && isDeleted) return false;
      if (!viewTrash && hideReviewed && isReviewed) return false;

      const matchSearch = evt.nct_id.toLowerCase().includes(term) || evt.notes.toLowerCase().includes(term) || evt.drug_name.toLowerCase().includes(term) || evt.ticker.toLowerCase().includes(term);
      const matchCompany = selCompanies.includes("ALL") || selCompanies.some(c => evt.ticker.includes(c));
      const matchStatus = selStatuses.includes("ALL") || selStatuses.includes(evt.status);
      const evtDateAdded = evt.date_added || "Legacy Data";
      const matchDateAdded = selDateAddeds.includes("ALL") || selDateAddeds.includes(evtDateAdded);
      
      const evtSentiment = evt.sentiment || "Neutral";
      const matchSentiment = selSentiments.includes("ALL") || selSentiments.includes(evtSentiment);

      const matchNew = !showOnlyNew || evt.is_new; 
      
      return matchSearch && matchCompany && matchStatus && matchDateAdded && matchSentiment && matchNew;
    });

    currentFilteredData = sortData(filteredData);
    renderTable(currentFilteredData, viewTrash);
  }

  document.getElementById('global-search').addEventListener('input', applyFilters);
  document.getElementById('filter-new-only').addEventListener('change', applyFilters);
  document.getElementById('filter-unreviewed').addEventListener('change', applyFilters);
  document.getElementById('view-trash-only').addEventListener('change', applyFilters);

  function exportToCSV() {
    if (currentFilteredData.length === 0) {
        alert("No data to export!");
        return;
    }
    
    const headers = ["Event Date", "Date Added", "Ticker", "NCT IDs", "Drug Name", "Indication", "Status", "Sentiment", "Extracted Context", "Source URL"];
    
    let csvContent = headers.join(",") + "\n";

    currentFilteredData.forEach(row => {
        const escapeCSV = (str) => `"${String(str || "").replace(/"/g, '""')}"`;
        
        const rowData = [
            escapeCSV(row.date),
            escapeCSV(row.date_added || "Legacy Data"),
            escapeCSV(row.ticker),
            escapeCSV(row.nct_id),
            escapeCSV(row.drug_name),
            escapeCSV(row.indication),
            escapeCSV(row.status),
            escapeCSV(row.sentiment || "Neutral"),
            escapeCSV(row.notes),
            escapeCSV(row.source)
        ];
        csvContent += rowData.join(",") + "\n";
    });

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", `${currentPrefix.toUpperCase()}_Trials_Export_${new Date().toISOString().split('T')[0]}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  function renderTable(data, isTrashView) {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    
    if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="11" style="text-align:center; padding:30px; color:#666;">No results found for current filters.</td></tr>`;
        return;
    }

    data.forEach(evt => {
      const evtKey = getEventKey(evt);
      const isReviewed = reviewedKeys.includes(evtKey);
      
      const tr = document.createElement('tr');
      
      if (isTrashView) {
          tr.classList.add('row-trash');
      } else {
          if (evt.is_new) tr.classList.add('row-new'); 
          if (isReviewed) tr.classList.add('row-reviewed');
      }

      const newBadge = evt.is_new && !isTrashView ? `<span class="badge-new">NEW</span>` : "";
      
      let statusClass = "status-unspec";
      if (evt.status === "Actual Data Reported") statusClass = "status-actual";
      if (evt.status === "Expected Future Data") statusClass = "status-future";
      
      const displayDateAdded = evt.date_added || "Legacy Data";
      const sentLabel = evt.sentiment || "Neutral";
      const sentClass = `sent-${sentLabel.toLowerCase()}`;
      
      const nctArray = evt.nct_id.split(',').map(id => id.trim());
      const nctBadges = nctArray.map(id => `<a href="https://clinicaltrials.gov/study/${id}" target="_blank" class="td-nct">${id}</a>`).join('');

      const indArray = (evt.indication || "").split(',').map(ind => ind.trim());
      const indBadges = indArray.map(ind => `<span class="ind-badge">${ind}</span>`).join(' ');

      const actionBtn = isTrashView 
        ? `<button class="action-btn btn-restore" onclick="toggleTrash('${evtKey}')">Restore</button>`
        : `<button class="action-btn btn-trash" onclick="toggleTrash('${evtKey}')">Trash</button>`;

      tr.innerHTML = `
        <td class="checkbox-wrapper"><input type="checkbox" onchange="toggleReview('${evtKey}')" ${isReviewed ? 'checked' : ''}></td>
        <td class="td-date">${evt.date}</td>
        <td class="td-date-added">${displayDateAdded}</td>
        <td class="td-ticker">${evt.ticker} ${newBadge}</td>
        <td><div class="nct-container">${nctBadges}</div></td>
        <td><strong>${evt.drug_name}</strong><br><div style="margin-top:4px;">${indBadges}</div></td>
        <td><span class="status-badge ${statusClass}">${evt.status}</span></td>
        <td><span class="sent-badge ${sentClass}">${sentLabel}</span></td>
        <td class="td-notes"><em>${evt.notes}</em></td>
        <td><a href="${evt.source}" target="_blank" style="color:#0a9396; font-weight:bold;">${evt.source_type}</a></td>
        <td>${actionBtn}</td>
      `;
      tbody.appendChild(tr);
    });
  }
</script>
</body>
</html>
